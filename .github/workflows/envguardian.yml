name: EnvGuardian Check

on:
  push:
  pull_request:

jobs:
  envguardian:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EnvGuardian
        run: npm install --no-save @marcosjgb/envguardian

      - name: Run EnvGuardian
        run: npx envguardian check --ci --only-missing