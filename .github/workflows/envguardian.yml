name: EnvGuardian Check

on:
  push:
  pull_request:

jobs:
  envguardian:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run EnvGuardian
        run: node dist/cli/index.js check --ci --only-missing